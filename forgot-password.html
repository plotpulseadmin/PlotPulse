<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotPulse - Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #FF6DA2; 
            --blue: #4E8BC4; 
            --bg: linear-gradient(180deg, #FF99BE 0%, #C2E1FD 100%); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Happy Monkey', sans-serif; }
        
        body { 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }

        .form-container { 
            width: 100%; 
            max-width: 320px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            align-items: center; 
            text-align: center;
        }

        .instruction-text {
            color: white;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 10px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        input { 
            width: 100%; 
            padding: 14px 20px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.7); 
            background: rgba(255,255,255,0.5); 
            font-size: 0.9rem; 
            outline: none; 
            backdrop-filter: blur(5px);
        }

        .action-btn { 
            width: 100%; 
            background: var(--pink); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 30px; 
            font-weight: 800; 
            text-decoration: none; 
            text-align: center; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 109, 162, 0.3);
        }

        .back-link { 
            margin-top: 10px;
            font-size: 0.8rem; 
            color: var(--blue); 
            text-decoration: none; 
            font-weight: 800; 
        }

        /* Success Message State */
        .hidden { display: none; }
        .success-icon { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="form-container" id="reset-form">
        <h2 style="color: var(--blue); margin-bottom: 5px;">Lost your spark?</h2>
        <p class="instruction-text">Enter your email address and we'll send you a link to reset your password.</p>
        
        <input type="email" id="reset-email" placeholder="Enter your email">
        
        <button class="action-btn" onclick="sendReset()">Send Link</button>
        
        <a href="login.html" class="back-link">← Back to Login</a>
    </div>

    <div class="form-container hidden" id="success-msg">
        <div class="success-icon">✉️</div>
        <h2 style="color: var(--blue);">Check your inbox!</h2>
        <p class="instruction-text">If an account exists for that email, you'll receive a reset link shortly.</p>
        <a href="login.html" class="action-btn">Return to Login</a>
    </div>

    <script>
        function sendReset() {
            const email = document.getElementById('reset-email').value;
            if (email.includes('@')) {
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } else {
                alert("Please enter a valid email address!");
            }
        }
    </script>
</body>
</html>
