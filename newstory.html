<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlotPulse - Story Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
    <style>
        :root {
            --pp-blue-light: #C2E1FD;
            --pp-pink-light: #FFB6D3;
            --pp-pink-vibrant: #FF6DA2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Happy Monkey', system-ui; }
        
        body { 
            background: linear-gradient(180deg, var(--pp-pink-light) 0%, var(--pp-blue-light) 100%); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* --- HEADER --- */
        #mainHeader {
            height: 65px; display: flex; align-items: center;
            padding: 0 20px; width: 100%; position: fixed; top: 0; left: 0; z-index: 1000;
            transition: opacity 0.3s ease;
        }
        
        .btn-back { background: transparent; border: none; cursor: pointer; display: flex; padding: 5px; }
        .btn-back img { width: 32px; height: 32px; opacity: 0.8; }

        /* --- CONTENT AREA --- */
        .page-content { 
            flex-grow: 1; overflow-y: auto; 
            padding: 85px 25px 40px 25px; 
            display: flex; flex-direction: column; gap: 30px;
        }

        /* --- COVER SECTION --- */
        .cover-section { display: flex; align-items: center; gap: 20px; }
        .cover-box-glass {
            width: 90px; height: 130px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .cover-box-glass img { width: 25px; opacity: 0.4; }
        
        .cover-labels { display: flex; flex-direction: column; gap: 2px; }
        .upload-label { font-weight: 800; color: #444; font-size: 1rem; text-transform: uppercase; }
        .size-hint { font-size: 0.7rem; color: #666; opacity: 0.8; }

        /* --- INPUT GROUPS --- */
        .input-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
        .label-row { display: flex; align-items: center; gap: 8px; position: relative; }
        .input-label { font-weight: 800; font-size: 0.85rem; color: var(--pp-pink-vibrant); text-transform: uppercase; letter-spacing: 1px; }

        .info-icon { width: 16px; height: 16px; opacity: 0.7; cursor: pointer; }

        /* --- RECTANGLE GLASS NOTE --- */
        #goalNote {
            position: absolute; 
            left: 110px; 
            top: 50%;
            transform: translateY(-50%);
            width: 230px; 
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.65rem;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: none; 
            z-index: 2000;
            line-height: 1.2;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px);
            border: none; border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            padding: 12px 5px; font-size: 1rem; color: #333; outline: none; transition: 0.3s;
        }
        .glass-input:focus { border-bottom-color: var(--pp-pink-vibrant); background: rgba(255, 255, 255, 0.2); }

        /* --- TAGS & SUGGESTIONS --- */
        #suggestionBox {
            position: absolute; top: 100%; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 15px; margin-top: 5px; max-height: 150px;
            overflow-y: auto; z-index: 2000; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid white;
        }
        .suggestion-item { padding: 12px 15px; font-size: 0.9rem; color: #444; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag-chip { background: var(--pp-pink-vibrant); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }

        /* --- ACTION BUTTON --- */
        #dynamicBtn {
            width: 100%; background: var(--pp-pink-vibrant); color: white;
            border: none; padding: 18px; border-radius: 25px;
            font-size: 1.3rem; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 109, 162, 0.3);
            text-transform: uppercase; letter-spacing: 2px; margin-top: 10px;
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <button class="btn-back" onclick="window.location.href='post.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/93/93634.png" alt="Back">
        </button>
    </header>

    <div class="page-content" id="scrollContent">
        
        <div class="cover-section">
            <div class="cover-box-glass" onclick="document.getElementById('fileInput').click()">
                <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png">
                <input type="file" id="fileInput" style="display: none;" accept="image/*">
            </div>
            <div class="cover-labels">
                <span class="upload-label">ADD A COVER</span>
                <span class="size-hint">Suggested Size: 512x800</span>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">STORY TITLE</label>
            <input type="text" id="storyTitle" class="glass-input" placeholder="Give your masterpiece a name...">
        </div>

        <div class="input-group">
            <label class="input-label">STORY DESCRIPTION</label>
            <textarea class="glass-input" style="min-height: 80px; resize: none;" placeholder="What's the pulse of your plot?"></textarea>
        </div>

        <div class="input-group">
            <label class="input-label">STORY TAGS</label>
            <input type="text" id="tagInput" class="glass-input" placeholder="Type a genre (e.g. Rom)">
            <div id="suggestionBox"></div>
            <div class="tags-container" id="tagsList"></div>
        </div>

        <div class="input-group">
            <div class="label-row">
                <label class="input-label">STORY GOAL</label>
                <img src="https://cdn-icons-png.flaticon.com/512/6583/6583141.png" class="info-icon" onclick="toggleNote(event)">
                <div id="goalNote">
                    Set a mission: Introduce the hero, reach 1k words, or write a cliffhanger!
                </div>
            </div>
            <input type="text" class="glass-input" placeholder="What's your mission for this story?">
        </div>

        <div class="btn-action-container">
            <button id="dynamicBtn" onclick="window.location.href='chapter.html'">SKIP</button>
        </div>
    </div>

    <script>
        const generalTags = ["Romance", "Action", "Adventure", "Fantasy", "Sci-Fi", "Mystery", "Thriller", "Horror", "Drama", "Poetry"];
        const titleInput = document.getElementById('storyTitle');
        const tagInput = document.getElementById('tagInput');
        const suggestionBox = document.getElementById('suggestionBox');
        const tagsList = document.getElementById('tagsList');
        const actionBtn = document.getElementById('dynamicBtn');
        const header = document.getElementById('mainHeader');
        const content = document.getElementById('scrollContent');

        titleInput.addEventListener('input', () => {
            actionBtn.textContent = titleInput.value.trim().length > 0 ? 'NEXT' : 'SKIP';
        });

        function toggleNote(e) {
            e.stopPropagation();
            const note = document.getElementById('goalNote');
            note.style.display = (note.style.display === 'block') ? 'none' : 'block';
        }

        tagInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            suggestionBox.innerHTML = '';
            if (val.length < 1) { suggestionBox.style.display = 'none'; return; }
            const matches = generalTags.filter(t => t.toLowerCase().includes(val));
            if (matches.length > 0) {
                suggestionBox.style.display = 'block';
                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = match;
                    div.onclick = () => addTag(match);
                    suggestionBox.appendChild(div);
                });
            } else { suggestionBox.style.display = 'none'; }
        });

        function addTag(text) {
            const chip = document.createElement('span');
            chip.className = 'tag-chip';
            chip.textContent = '#' + text.replace('#', '');
            tagsList.appendChild(chip);
            tagInput.value = '';
            suggestionBox.style.display = 'none';
        }

        window.onclick = () => {
            suggestionBox.style.display = 'none';
            document.getElementById('goalNote').style.display = 'none';
        };

        let lastScroll = 0;
        content.addEventListener('scroll', () => {
            const currentScroll = content.scrollTop;
            header.style.opacity = (currentScroll > 50 && currentScroll > lastScroll) ? "0" : "1";
            lastScroll = currentScroll;
        });
    </script>
</body>
</html>
