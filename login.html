<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotPulse - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FF6DA2; --blue: #4E8BC4; --bg: linear-gradient(180deg, #FF99BE 0%, #C2E1FD 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Happy Monkey', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
        .logo-img { width: 250px; margin-bottom: 25px; }
        .form-container { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .input-wrapper { width: 100%; position: relative; }
        input { width: 100%; padding: 14px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.5); font-size: 0.9rem; outline: none; }
        .eye-toggle { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; cursor: pointer; opacity: 0.6; display: flex; align-items: center; }
        .forgot-link { align-self: flex-end; font-size: 0.75rem; color: var(--blue); text-decoration: none; font-weight: 600; margin-right: 15px; margin-top: -5px; }
        .sign-in-btn { width: 100%; background: var(--pink); color: white; border: none; padding: 14px; border-radius: 30px; font-weight: 800; text-decoration: none; text-align: center; margin-top: 10px; }
        .hide-on-type { width: 100%; display: flex; flex-direction: column; gap: 10px; transition: opacity 0.2s; }
        .social-btn { width: 100%; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.7); color: var(--blue); padding: 12px; border-radius: 30px; font-weight: 600; font-size: 0.8rem; text-decoration: none; text-align: center; }
        .footer-text { position: absolute; bottom: 30px; font-size: 0.8rem; color: var(--blue); transition: opacity 0.2s; }
        .footer-text a { font-weight: 800; text-decoration: none; color: var(--blue); }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <img src="logo.png" alt="Creative Club" class="logo-img">
    
    <div class="form-container">
        <div class="input-wrapper">
            <input type="email" id="email" placeholder="Username/Email Address" oninput="checkTyping()">
        </div>
        <div class="input-wrapper">
            <input type="password" id="pass" placeholder="Password" oninput="checkTyping()">
            <div class="eye-toggle" onclick="togglePass()">
                <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="#4E8BC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                <svg id="eye-open" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="#4E8BC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
        </div>
        
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        <a href="landing.html" class="sign-in-btn">Sign In</a>

        <div id="social-area" class="hide-on-type">
            <a href="auth-google.html" class="social-btn">Continue with Google</a>
            <a href="auth-facebook.html" class="social-btn">Continue with Facebook</a>
        </div>
    </div>

    <div id="footer-area" class="footer-text">
        New pulse? <a href="signup.html">Create Account!</a>
    </div>

    <script>
        function togglePass() {
            const p = document.getElementById('pass');
            const openIcon = document.getElementById('eye-open');
            const closedIcon = document.getElementById('eye-closed');
            
            if (p.type === 'password') {
                p.type = 'text'; // Show password
                openIcon.style.display = 'block'; // Show Open Eye
                closedIcon.style.display = 'none'; // Hide Closed Eye
            } else {
                p.type = 'password'; // Hide password
                openIcon.style.display = 'none'; // Hide Open Eye
                closedIcon.style.display = 'block'; // Show Closed Eye
            }
        }

        function checkTyping() {
            const e = document.getElementById('email').value.length;
            const p = document.getElementById('pass').value.length;
            const s = document.getElementById('social-area');
            const f = document.getElementById('footer-area');
            
            if (e > 0 || p > 0) {
                s.classList.add('hidden');
                f.classList.add('hidden');
            } else {
                s.classList.remove('hidden');
                f.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
