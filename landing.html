<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotPulse - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-dark: #4E8BC4;
            --pink-vibrant: #FF6DA2;
            --white: #ffffff;
            --tag-bg: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(180deg, #FF99BE 0%, #C2E1FD 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding-bottom: 110px;
            position: relative;
        }

        /* --- HEADER & 200% LOGO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            height: 70px; padding: 0 25px; background: transparent; 
            position: absolute; top: 0; left: 0; right: 0; z-index: 100;
        }
        
        .header-logo { 
            height: 200%; width: auto; object-fit: contain;
            display: block; margin-top: 25px; 
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1)); 
        }

        .avatar-profile { 
            width: 44px; height: 44px; border-radius: 50%; 
            border: 2.5px solid var(--white); background: #eee; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- SEARCH --- */
        .search-container { padding: 90px 20px 20px; }
        .search-input {
            width: 100%; padding: 14px 45px 14px 22px; border-radius: 30px; border: none;
            background: rgba(255, 255, 255, 0.9); box-shadow: 0 8px 20px rgba(0,0,0,0.08); 
            outline: none; font-size: 0.95rem;
        }

        /* --- SHELF STYLING --- */
        .section-title {
            padding: 25px 20px 5px; font-family: 'Happy Monkey', cursive;
            color: var(--blue-dark); font-size: 1rem; text-transform: uppercase;
        }

        .shelf-row {
            display: flex; overflow-x: auto; padding: 10px 20px 30px; scrollbar-width: none;
        }
        .shelf-row::-webkit-scrollbar { display: none; }

        .book-container { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }

        .book-item {
            position: relative; height: 180px; width: 38px; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            cursor: pointer; display: flex; overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.15); box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .book-spine {
            min-width: 38px; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 2;
        }

        .spine-title {
            color: white; font-family: 'Happy Monkey'; font-size: 0.65rem;
            transform: rotate(-90deg); white-space: nowrap;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .book-cover {
            min-width: 120px; height: 180px; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end; padding: 10px; 
            position: relative; background-size: cover; background-position: center;
        }

        .cover-info-overlay {
            width: 100%; padding: 5px; background: rgba(255, 255, 255, 0.85);
            border-radius: 4px; text-align: center;
        }

        .view-count { font-size: 0.55rem; color: #555; font-weight: 600; }

        .book-item.active {
            width: 158px; border-radius: 8px; z-index: 10;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3); margin: 0 10px;
        }

        .book-tag {
            margin-top: 8px; font-size: 0.5rem; font-weight: 700;
            background: var(--tag-bg); color: var(--blue-dark);
            padding: 2px 4px; border-radius: 3px; text-transform: uppercase;
            max-width: 38px; overflow: hidden; text-overflow: ellipsis; 
            white-space: nowrap; transition: max-width 0.5s;
        }

        .book-item.active + .book-tag { max-width: 150px; }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: #fff; display: flex; justify-content: space-around; align-items: center;
            border-radius: 30px 30px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.08);
            z-index: 200; padding: 0 10px;
        }

        .nav-link { 
            text-align: center; text-decoration: none; color: #888; 
            font-size: 0.7rem; font-weight: 600; display: flex; 
            flex-direction: column; align-items: center; gap: 5px;
        }

        .nav-icon-img {
            width: 26px; height: 26px; object-fit: contain;
            opacity: 0.5; transition: 0.3s;
        }

        .nav-link.active { color: var(--pink-vibrant); }
        .nav-link.active .nav-icon-img { 
            opacity: 1; 
            filter: drop-shadow(0 2px 4px rgba(255, 109, 162, 0.3));
        }
    </style>
</head>
<body>

    <div class="section-title">Most Loved</div>
    <div class="shelf-row">
        <div class="book-container">
            <div class="book-item" onclick="toggle(this)" style="background-color: #ad1457;">

                <div class="book-cover" style="background-image: url('https://images.unsplash.com/photo-1516589174184-c685266e430c?w=400');">

    <div class="section-title">Top Picks</div>
    <div class="shelf-row">

    </div>

    <nav class="bottom-nav">

        </a>
        <a href="#" class="nav-link">

    </nav>

    <script>
        function toggle(el) {
            const all = document.querySelectorAll('.book-item');
            all.forEach(b => { if(b !== el) b.classList.remove('active'); });
            el.classList.toggle('active');
        }
    </script>
