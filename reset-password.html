<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlotPulse - Create New Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #FF6DA2; 
            --blue: #4E8BC4; 
            --bg: linear-gradient(180deg, #FF99BE 0%, #C2E1FD 100%); 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Happy Monkey', sans-serif; }
        
        body { 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            overflow: hidden;
        }

        .form-container { 
            width: 100%; 
            max-width: 320px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            align-items: center;
            text-align: center;
        }

        h2 { color: var(--blue); margin-bottom: 5px; }
        p { color: white; font-size: 0.85rem; line-height: 1.4; margin-bottom: 10px; }

        /* --- INPUT STYLING --- */
        .input-wrapper { width: 100%; position: relative; }
        
        input { 
            width: 100%; 
            padding: 14px 20px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.7); 
            background: rgba(255,255,255,0.5); 
            font-size: 0.9rem; 
            outline: none; 
            backdrop-filter: blur(5px);
        }

        .eye-toggle { 
            position: absolute; 
            right: 18px; 
            top: 50%; 
            transform: translateY(-50%); 
            width: 22px; 
            height: 22px; 
            cursor: pointer; 
            opacity: 0.6; 
            display: flex; 
            align-items: center; 
        }
        
        .eye-toggle svg { width: 100%; height: 100%; }

        .action-btn { 
            width: 100%; 
            background: var(--pink); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 30px; 
            font-weight: 800; 
            text-decoration: none; 
            text-align: center; 
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 109, 162, 0.3);
        }

        /* --- SUCCESS STATE STYLING --- */
        #done-box {
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #done-box:not(.hidden) {
            display: flex; /* Show as flex when .hidden is removed */
        }

        .success-visual {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .success-sparkle {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
            animation: pulse-sparkle 2s infinite ease-in-out;
        }

        @keyframes pulse-sparkle {
            0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="form-container" id="reset-box">
        <h2>New Password</h2>
        <p>Ensure your new password is easy for you to remember but hard for others to guess!</p>
        
        <div class="input-wrapper">
            <input type="password" id="new-pass" placeholder="New Password">
            <div class="eye-toggle" onclick="togglePass('new-pass', 'eye-closed-1', 'eye-open-1')">
                <svg id="eye-closed-1" viewBox="0 0 24 24" fill="none" stroke="#4E8BC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                <svg id="eye-open-1" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="#4E8BC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
        </div>

        <div class="input-wrapper">
            <input type="password" id="confirm-pass" placeholder="Confirm New Password">
            <div class="eye-toggle" onclick="togglePass('confirm-pass', 'eye-closed-2', 'eye-open-2')">
                <svg id="eye-closed-2" viewBox="0 0 24 24" fill="none" stroke="#4E8BC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                <svg id="eye-open-2" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="#4E8BC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
        </div>
        
        <button class="action-btn" onclick="completeReset()">Update Password</button>
    </div>

    <div class="form-container hidden" id="done-box">
        <div class="success-visual">
            <img src="https://cdn-icons-png.flaticon.com/512/2267/2267359.png" class="success-sparkle" alt="Success">
        </div>
        <h2>All Set!</h2>
        <p>Your password has been updated. You can now log in with your new credentials.</p>
        <a href="login.html" class="action-btn">Back to Login</a>
    </div>

    <script>
        function togglePass(inputId, closedId, openId) {
            const p = document.getElementById(inputId);
            const closedIcon = document.getElementById(closedId);
            const openIcon = document.getElementById(openId);
            
            if (p.type === 'password') {
                p.type = 'text';
                closedIcon.style.display = 'none';
                openIcon.style.display = 'block';
            } else {
                p.type = 'password';
                closedIcon.style.display = 'block';
                openIcon.style.display = 'none';
            }
        }

        function completeReset() {
            const p1 = document.getElementById('new-pass').value;
            const p2 = document.getElementById('confirm-pass').value;

            if (p1 === "" || p2 === "") {
                alert("Please fill in both fields!");
                return;
            }

            if (p1 === p2) {
                document.getElementById('reset-box').classList.add('hidden');
                document.getElementById('done-box').classList.remove('hidden');
            } else {
                alert("Passwords do not match!");
            }
        }
    </script>
</body>
</html>
